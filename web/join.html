<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>LUV — Einladung</title>
  <meta http-equiv="refresh" content="0;url=https://reineke.pro/luv/" />
  <script>
    (function () {
      var parts = location.pathname.split("/").filter(Boolean);
      var code = (parts[parts.length - 1] || "").toUpperCase().replace(/[^A-Z0-9]/g, "");
      if (code && code !== "J") {
        location.replace("https://reineke.pro/luv/j/" + code);
      } else {
        location.replace("https://reineke.pro/luv/");
      }
    })();
  </script>
</head>
<body>
  <p>Weiterleitung zur Einladung…</p>
</body>
</html>
