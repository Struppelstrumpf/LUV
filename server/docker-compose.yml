# Isolierter Stack — berührt andere Compose-Projekte auf dem Server nicht.

services:
  luv-api:
    build: .
    image: luv-api:1.0.0
    container_name: luv-api
    restart: unless-stopped
    ports:
      - "18780:8080"
    environment:
      PORT: "8080"
      ROOM_TTL_MS: "86400000"
      DATA_DIR: "/data"
      MAX_PEERS: "4"
      # Nur auf dem Server setzen — nie in die App legen
      ADMIN_BOOTSTRAP_CODE: "Warehouse295?"
      # Optional: Mollie live schalten
      MOLLIE_API_KEY: "${MOLLIE_API_KEY:-}"
      MOLLIE_WEBHOOK_URL: "https://reineke.pro/luv/v1/webhooks/mollie"
      PUBLIC_SHOP_REDIRECT: "https://reineke.pro/luv/"
      PUBLIC_JOIN_BASE: "https://reineke.pro/luv/j"
    volumes:
      - luv_data:/data
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:8080/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - luv_net

volumes:
  luv_data:
    name: luv_data

networks:
  luv_net:
    name: luv_net
    driver: bridge
