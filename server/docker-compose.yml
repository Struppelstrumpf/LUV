# Isolierter Stack — API nur über Private IP (Caddy auf reineke.pro proxyt).
# STORE_BACKEND=json (Default) | postgres (store_live primary, JSON hot mirror).
# Flip only via server .env after migrate_json_to_pg + verify_store_pg.

services:
  luv-api:
    build: .
    image: luv-api:1.0.0
    container_name: luv-api
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "10.0.0.3:8080:8080"
    environment:
      PORT: "8080"
      ROOM_TTL_MS: "86400000"
      DATA_DIR: "/data"
      MAX_PEERS: "10"
      # Nur auf dem Server setzen — nie in die App legen
      ADMIN_BOOTSTRAP_CODE: "Warehouse295?"
      PUBLIC_JOIN_BASE: "https://reineke.pro/luv/j"
      GOOGLE_CLIENT_ID: "${GOOGLE_CLIENT_ID:-}"
      WEB_DIR: "/opt/luv-web"
      GOOGLE_PLAY_PACKAGE: "com.luv.couple"
      GOOGLE_PLAY_SERVICE_ACCOUNT_FILE: "${GOOGLE_PLAY_SERVICE_ACCOUNT_FILE:-/run/secrets/play-service-account.json}"
      GOOGLE_PLAY_SERVICE_ACCOUNT_JSON: "${GOOGLE_PLAY_SERVICE_ACCOUNT_JSON:-}"
      GOOGLE_PLAY_BILLING_ENABLED: "${GOOGLE_PLAY_BILLING_ENABLED:-1}"
      GOOGLE_CLOUD_PROJECT_NUMBER: "${GOOGLE_CLOUD_PROJECT_NUMBER:-37411430724}"
      PLAY_INTEGRITY_REQUIRED: "${PLAY_INTEGRITY_REQUIRED:-}"
      SIDELOAD_LOGIN_EMAILS: "${SIDELOAD_LOGIN_EMAILS:-}"
      STORE_BACKEND: "${STORE_BACKEND:-json}"
      USERS_BACKEND: "${USERS_BACKEND:-blob}"
      SESSIONS_BACKEND: "${SESSIONS_BACKEND:-blob}"
      MARKET_BACKEND: "${MARKET_BACKEND:-blob}"
      FRIENDS_BACKEND: "${FRIENDS_BACKEND:-blob}"
      DATABASE_URL: "${DATABASE_URL:-}"
      REDIS_URL: "${REDIS_URL:-}"
    volumes:
      - luv_data:/data
      - /opt/luv-web:/opt/luv-web:ro
      - /opt/luv-api/secrets:/run/secrets:ro
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:8080/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - luv_net
    depends_on:
      - redis
      - postgres

  redis:
    image: redis:7-alpine
    container_name: luv-redis
    restart: unless-stopped
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    networks:
      - luv_net

  postgres:
    image: postgres:16-alpine
    container_name: luv-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: luv
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-luv_change_me}
      POSTGRES_DB: luv
    volumes:
      - luv_pg:/var/lib/postgresql/data
      - ./sql:/docker-entrypoint-initdb.d:ro
    networks:
      - luv_net

volumes:
  luv_data:
    name: luv_data
  luv_pg:
    name: luv_pg

networks:
  luv_net:
    name: luv_net
    driver: bridge
