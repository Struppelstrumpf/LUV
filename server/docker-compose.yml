# Isolierter Stack — berührt andere Compose-Projekte auf dem Server nicht.

services:
  luv-api:
    build: .
    image: luv-api:1.0.0
    container_name: luv-api
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "18780:8080"
    environment:
      PORT: "8080"
      ROOM_TTL_MS: "86400000"
      DATA_DIR: "/data"
      MAX_PEERS: "10"
      # Nur auf dem Server setzen — nie in die App legen
      ADMIN_BOOTSTRAP_CODE: "Warehouse295?"
      PUBLIC_JOIN_BASE: "https://reineke.pro/luv/j"
      GOOGLE_CLIENT_ID: "${GOOGLE_CLIENT_ID:-}"
      WEB_DIR: "/opt/luv-web"
      # Google Play Billing — JSON als Env ODER Datei im Container (siehe Deploy-Doku)
      GOOGLE_PLAY_PACKAGE: "com.luv.couple"
      GOOGLE_PLAY_SERVICE_ACCOUNT_FILE: "${GOOGLE_PLAY_SERVICE_ACCOUNT_FILE:-/run/secrets/play-service-account.json}"
      GOOGLE_PLAY_SERVICE_ACCOUNT_JSON: "${GOOGLE_PLAY_SERVICE_ACCOUNT_JSON:-}"
      GOOGLE_PLAY_BILLING_ENABLED: "${GOOGLE_PLAY_BILLING_ENABLED:-1}"
      # Play Integrity (Anti-Bot bei Neuanmeldung) — Project-Nummer aus Google Cloud
      GOOGLE_CLOUD_PROJECT_NUMBER: "${GOOGLE_CLOUD_PROJECT_NUMBER:-37411430724}"
      PLAY_INTEGRITY_REQUIRED: "${PLAY_INTEGRITY_REQUIRED:-}"
    volumes:
      - luv_data:/data
      - /opt/luv-web:/opt/luv-web:ro
      # Host-Datei optional: mkdir -p /opt/luv-api/secrets && play-service-account.json ablegen
      - /opt/luv-api/secrets:/run/secrets:ro
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:8080/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - luv_net

volumes:
  luv_data:
    name: luv_data

networks:
  luv_net:
    name: luv_net
    driver: bridge
